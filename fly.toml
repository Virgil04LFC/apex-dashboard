# fly.toml — ClientFlow Multi-Tenant Review Dashboard
# Region: Frankfurt (fra)
# Deploy: flyctl deploy --remote-only (from Mac, repo cloned locally)

app            = "apex-reviews-dash"
primary_region = "fra"

[build]

[env]
  # DEFAULT_TENANT covers the legacy apex-reviews-dash.fly.dev URL.
  # New dealers resolve via subdomain (e.g. apex.clientflowapp.uk → 'apex').
  DEFAULT_TENANT = "apex"

[mounts]
  source      = "dashboard_data"
  destination = "/data"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
